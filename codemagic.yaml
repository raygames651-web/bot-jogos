workflows:
  android-apk:
    name: Gerar APK do Quiz
    max_build_duration: 15
    instance_type: mac_mini_m1
    environment:
      groups:
        -   sdk: 33
    triggering:
      events:
        - push
    scripts:
      - name: Compilar Jogo
        script: |
          cd jogo-top
          chmod +x gradlew
          ./gradlew assembleDebug
    artifacts:
      - jogo-top/app/build/outputs/apk/debug/*.apk
